name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Lint with pylint
        run: |
          pip install pylint
          pylint prode_mundial/predictor.py prode_mundial/bracket.py prode_mundial/data.py --rcfile=.pylintrc || true

      - name: Test with pytest
        run: |
          pytest prode_mundial/tests/ -v --tb=short

      - name: Verify simulation runs
        run: |
          python prode_mundial/main.py --goleadores
